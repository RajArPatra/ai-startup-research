name: Weekly AI Research Papers

on:
  schedule:
    - cron: '23 3 * * 1,6'  # Every Saturday & Monday 3:23 AM UTC (~8:53 AM IST)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run research scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python src/research_scraper.py --output-dir docs/research-data/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/research-data/
          git diff --staged --quiet || git commit -m "Weekly research report $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
